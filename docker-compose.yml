# Local development only.
# This is NOT the production database.
# Production uses Neon Postgres (cloud) and Fly for the API.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: karion
      POSTGRES_PASSWORD: karion
      POSTGRES_DB: karion
    ports:
      - "5432:5432"
    volumes:
      - .data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - .data/redis:/data

volumes:
  postgres:
  redis:
